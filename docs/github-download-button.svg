<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="-apple-system, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif">
  <defs>
    <style>
      .browser { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .browser-bar { fill: #f6f8fa; }
      .file-toolbar { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
      .icon-btn { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .icon-btn-hl { fill: #fff8e1; stroke: #f59e0b; stroke-width: 2.5; }
      .icon-stroke { stroke: #1f2328; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-stroke-hl { stroke: #b45309; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .crumb { fill: #0969da; font-size: 13px; }
      .crumb-current { fill: #1f2328; font-size: 13px; font-weight: 600; }
      .meta { fill: #59636e; font-size: 11.5px; }
      .body-line { stroke: #d0d7de; stroke-width: 1; }
      .body-text { fill: #6e7781; font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace; }
      .callout-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .callout-text { fill: #92400e; font-size: 14px; font-weight: 700; }
      .callout-arrow { stroke: #f59e0b; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .pulse { fill: none; stroke: #f59e0b; stroke-width: 2; opacity: 0.6; }
    </style>
  </defs>

  <rect width="900" height="260" fill="#f8fafc"/>

  <!-- Browser window -->
  <rect class="browser" x="30" y="20" width="840" height="220" rx="8"/>
  <rect class="browser-bar" x="30" y="20" width="840" height="32" rx="8"/>
  <rect class="browser-bar" x="30" y="40" width="840" height="12"/>
  <circle cx="48" cy="36" r="5" fill="#ff5f57"/>
  <circle cx="66" cy="36" r="5" fill="#febc2e"/>
  <circle cx="84" cy="36" r="5" fill="#28c840"/>
  <rect x="120" y="28" width="500" height="16" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="135" y="40" fill="#59636e" font-size="11" font-family="'SFMono-Regular', Consolas, monospace">github.com/sisolab/startup-programs/blob/main/grants.json</text>

  <!-- Breadcrumb -->
  <g transform="translate(50, 75)">
    <text class="crumb" x="0" y="0">sisolab</text>
    <text fill="#59636e" x="50" y="0" font-size="13">/</text>
    <text class="crumb" x="60" y="0">startup-programs</text>
    <text fill="#59636e" x="180" y="0" font-size="13">/</text>
    <text class="crumb-current" x="190" y="0">grants.json</text>
  </g>

  <!-- File toolbar -->
  <g transform="translate(50, 100)">
    <rect class="file-toolbar" x="0" y="0" width="800" height="44" rx="6"/>

    <!-- Left side: file meta -->
    <text class="meta" x="14" y="20">271 lines · 1.78 MB</text>
    <text class="meta" x="14" y="34">JSON</text>

    <!-- Right side: toolbar icons -->
    <!-- Code button -->
    <rect class="icon-btn" x="500" y="9" width="60" height="26" rx="6"/>
    <text x="530" y="26" text-anchor="middle" fill="#1f2328" font-size="11" font-weight="600">Code</text>

    <!-- Blame -->
    <rect class="icon-btn" x="568" y="9" width="60" height="26" rx="6"/>
    <text x="598" y="26" text-anchor="middle" fill="#1f2328" font-size="11" font-weight="600">Blame</text>

    <!-- Raw -->
    <rect class="icon-btn" x="640" y="9" width="44" height="26" rx="6"/>
    <text x="662" y="26" text-anchor="middle" fill="#1f2328" font-size="11" font-weight="600">Raw</text>

    <!-- Copy icon -->
    <rect class="icon-btn" x="692" y="9" width="28" height="26" rx="6"/>
    <g transform="translate(701, 16)">
      <rect class="icon-stroke" x="2" y="2" width="8" height="10" rx="1"/>
      <rect class="icon-stroke" x="5" y="0" width="8" height="10" rx="1" fill="#ffffff"/>
    </g>

    <!-- DOWNLOAD (highlighted) -->
    <circle class="pulse" cx="740" cy="22" r="22"/>
    <rect class="icon-btn-hl" x="724" y="6" width="32" height="32" rx="6"/>
    <g transform="translate(733, 13)">
      <line class="icon-stroke-hl" x1="7" y1="0" x2="7" y2="13"/>
      <polyline class="icon-stroke-hl" points="2,8 7,13 12,8"/>
      <line class="icon-stroke-hl" x1="1" y1="17" x2="13" y2="17"/>
    </g>

    <!-- Edit (pencil) -->
    <rect class="icon-btn" x="764" y="9" width="28" height="26" rx="6"/>
    <g transform="translate(771, 16)">
      <path class="icon-stroke" d="M 1 13 L 1 11 L 10 2 L 12 4 L 3 13 Z"/>
    </g>
  </g>

  <!-- File body preview -->
  <g transform="translate(50, 154)">
    <rect x="0" y="0" width="800" height="76" fill="#ffffff" stroke="#d0d7de" stroke-width="1" rx="6"/>
    <line class="body-line" x1="34" y1="0" x2="34" y2="76"/>
    <text class="body-text" x="20" y="16" text-anchor="end" fill="#8c959f">1</text>
    <text class="body-text" x="44" y="16">{</text>
    <text class="body-text" x="20" y="32" text-anchor="end" fill="#8c959f">2</text>
    <text class="body-text" x="54" y="32">"fetched_at_kst": "2026-05-18 02:27 KST",</text>
    <text class="body-text" x="20" y="48" text-anchor="end" fill="#8c959f">3</text>
    <text class="body-text" x="54" y="48">"total": 271,</text>
    <text class="body-text" x="20" y="64" text-anchor="end" fill="#8c959f">4</text>
    <text class="body-text" x="54" y="64">"items": [ ... ]</text>
  </g>

  <!-- Callout -->
  <g>
    <path class="callout-arrow" d="M 820 90 Q 855 95 822 120" marker-end="url(#arr)" fill="none"/>
    <polygon points="822,120 818,113 826,114" fill="#f59e0b"/>
    <rect class="callout-box" x="700" y="60" width="170" height="34" rx="8"/>
    <text class="callout-text" x="785" y="82" text-anchor="middle">이 ↓ 버튼을 클릭</text>
  </g>
</svg>
