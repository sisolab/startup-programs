<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 210" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <style>
      .card { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
      .step-num { fill: #ffffff; font-size: 16px; font-weight: 700; }
      .step-circle { fill: #1e40af; }
      .title { fill: #0f172a; font-size: 19px; font-weight: 700; }
      .arrow { fill: #475569; }
      .icon-bg { fill: #dbeafe; }
      .icon-stroke { stroke: #1e40af; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1000" height="210" fill="#e2e8f0"/>

  <!-- Step 1: Download files -->
  <g transform="translate(30, 15)">
    <rect class="card" width="290" height="180" rx="12"/>
    <circle class="step-circle" cx="26" cy="26" r="14"/>
    <text class="step-num" x="26" y="31" text-anchor="middle">1</text>

    <g transform="translate(145, 65)">
      <circle class="icon-bg" cx="0" cy="0" r="24"/>
      <path class="icon-stroke" d="M 0 -10 L 0 7 M -8 -1 L 0 7 L 8 -1"/>
      <line class="icon-stroke" x1="-12" y1="14" x2="12" y2="14"/>
    </g>

    <text class="title" x="145" y="125" text-anchor="middle">아래 2개 파일</text>
    <text class="title" x="145" y="150" text-anchor="middle">다운로드</text>
  </g>

  <polygon class="arrow" points="327,98 348,108 327,118"/>

  <!-- Step 2: Attach to AI chat -->
  <g transform="translate(355, 15)">
    <rect class="card" width="290" height="180" rx="12"/>
    <circle class="step-circle" cx="26" cy="26" r="14"/>
    <text class="step-num" x="26" y="31" text-anchor="middle">2</text>

    <g transform="translate(145, 65)">
      <circle class="icon-bg" cx="0" cy="0" r="24"/>
      <path class="icon-stroke" d="M 8 -10 L -6 4 a 7 7 0 0 0 10 10 L 14 2 a 11 11 0 0 0 -15 -15 L -11 -1 a 15 15 0 0 0 21 21 L 17 10"/>
    </g>

    <text class="title" x="145" y="125" text-anchor="middle">AI에게 2개 파일을</text>
    <text class="title" x="145" y="150" text-anchor="middle">첨부하기</text>
  </g>

  <polygon class="arrow" points="652,98 673,108 652,118"/>

  <!-- Step 3: Input profile -->
  <g transform="translate(680, 15)">
    <rect class="card" width="290" height="180" rx="12"/>
    <circle class="step-circle" cx="26" cy="26" r="14"/>
    <text class="step-num" x="26" y="31" text-anchor="middle">3</text>

    <g transform="translate(145, 65)">
      <circle class="icon-bg" cx="0" cy="0" r="24"/>
      <rect class="icon-stroke" x="-12" y="-10" width="24" height="18" rx="3"/>
      <line class="icon-stroke" x1="-7" y1="-4" x2="7" y2="-4"/>
      <line class="icon-stroke" x1="-7" y1="1" x2="3" y2="1"/>
      <path class="icon-stroke" d="M -4 8 L -1 13 L 2 8"/>
    </g>

    <text class="title" x="145" y="125" text-anchor="middle">AI에게 내가 원하는</text>
    <text class="title" x="145" y="150" text-anchor="middle">공고 조건을 입력하기</text>
  </g>
</svg>
