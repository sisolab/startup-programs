<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 220" font-family="-apple-system, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif">
  <defs>
    <style>
      .browser { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .browser-bar { fill: #f6f8fa; }
      .chatbox-hl { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .file-chip { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .file-chip-text { fill: #334155; font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace; font-weight: 500; }
      .placeholder { fill: #94a3b8; font-size: 13px; }
      .send-btn { fill: #1e40af; }
      .send-btn-hl-bg { fill: #fff8e1; stroke: #f59e0b; stroke-width: 2.5; }
      .callout-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .callout-text { fill: #92400e; font-size: 13px; font-weight: 700; }
      .callout-arrow { stroke: #f59e0b; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .step-num { fill: #ffffff; font-size: 13px; font-weight: 800; }
      .step-circle { fill: #f59e0b; }
      .browser-title { fill: #59636e; font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace; }
    </style>
  </defs>

  <rect width="840" height="220" fill="#f8fafc"/>

  <!-- Browser window -->
  <rect class="browser" x="0" y="0" width="840" height="220" rx="8"/>
  <rect class="browser-bar" x="0" y="0" width="840" height="32" rx="8"/>
  <rect class="browser-bar" x="0" y="20" width="840" height="12"/>
  <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="54" cy="16" r="5" fill="#28c840"/>
  <rect x="90" y="8" width="500" height="16" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="105" y="20" class="browser-title">claude.ai / chatgpt.com</text>

  <!-- Chat input area (highlighted with orange) -->
  <rect class="chatbox-hl" x="40" y="70" width="760" height="130" rx="14"/>

  <!-- Attached file chips at top of input -->
  <g transform="translate(56, 86)">
    <rect class="file-chip" x="0" y="0" width="170" height="36" rx="6"/>
    <rect x="10" y="8" width="20" height="20" rx="3" fill="#1e40af"/>
    <text x="20" y="22" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">JSON</text>
    <text class="file-chip-text" x="38" y="16">grants.json</text>
    <text class="file-chip-text" x="38" y="29" fill="#64748b" font-size="10">1.78 MB</text>
  </g>
  <g transform="translate(236, 86)">
    <rect class="file-chip" x="0" y="0" width="230" height="36" rx="6"/>
    <rect x="10" y="8" width="20" height="20" rx="3" fill="#475569"/>
    <text x="20" y="22" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">MD</text>
    <text class="file-chip-text" x="38" y="16">kstartup-curation-prompt.md</text>
    <text class="file-chip-text" x="38" y="29" fill="#64748b" font-size="10">12 KB</text>
  </g>

  <!-- Placeholder text in input -->
  <text class="placeholder" x="56" y="160">메시지 입력...</text>

  <!-- Send button (highlighted) -->
  <rect class="send-btn-hl-bg" x="746" y="148" width="36" height="36" rx="8"/>
  <g transform="translate(764, 166)">
    <path d="M 0 6 L 0 -8 M -6 -2 L 0 -8 L 6 -2" stroke="#b45309" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Step 1 callout: file attachment -->
  <g>
    <circle class="step-circle" cx="50" cy="55" r="11"/>
    <text class="step-num" x="50" y="60" text-anchor="middle">1</text>
    <text class="callout-text" x="68" y="60">두 파일을 채팅창에 첨부</text>
  </g>

  <!-- Step 2 callout: send button -->
  <g>
    <circle class="step-circle" cx="544" cy="166" r="11"/>
    <text class="step-num" x="544" y="171" text-anchor="middle">2</text>
    <text class="callout-text" x="562" y="171">메시지 입력 버튼 클릭</text>
    <path class="callout-arrow" d="M 720 168 L 738 168"/>
    <polygon points="744,168 738,164 738,172" fill="#f59e0b"/>
  </g>
</svg>
