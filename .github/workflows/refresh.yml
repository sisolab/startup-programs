name: Refresh grants

on:
  schedule:
    # 매일 KST 02:00 = UTC 17:00 (전날)
    - cron: '0 17 * * *'
  workflow_dispatch: # 수동 트리거 허용

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python and deps
        run: uv sync --frozen

      - name: Generate grants.md / grants.json
        env:
          KSTARTUP_API_KEY: ${{ secrets.KSTARTUP_API_KEY }}
        run: uv run python scripts/generate.py

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain grants.md grants.json)" ]]; then
            echo "변경 없음 — 스킵"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add grants.md grants.json
          git commit -m "chore: refresh grants ($(date -u '+%Y-%m-%d %H:%MZ'))"
          git push
